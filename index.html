<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NoteDeck — Notes &amp; Code</title>
<meta name="description" content="A notes and code workspace with syntax highlighting, themes, and templates." />
<meta name="theme-color" content="#12151C" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <header class="topbar">
    <button id="sidebarToggle" class="icon-btn only-mobile" aria-label="Toggle notes list">☰</button>
    <div class="brand">
      <span class="brand-glyph">&lt;/&gt;</span>
      <span class="brand-name">NoteDeck</span>
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="Search notes… (Ctrl+K)" autocomplete="off" />
    </div>
    <div class="topbar-actions">
      <button id="installBtn" class="btn btn-ghost" style="display:none">Install app</button>
      <button id="themeBtn" class="btn btn-ghost">🎨 Theme</button>
      <button id="newNoteBtn" class="btn btn-accent">+ New</button>
    </div>
  </header>

  <div class="body">
    <div id="scrim" class="scrim"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All <span id="countAll">0</span></button>
        <button class="filter-tab" data-filter="text">Notes <span id="countText">0</span></button>
        <button class="filter-tab" data-filter="code">Code <span id="countCode">0</span></button>
      </div>
      <div id="noteList" class="note-list"></div>
      <div class="sidebar-footer">
        <button id="exportBtn" class="link-btn">Export backup</button>
        <label class="link-btn file-label">
          Import
          <input id="importInput" type="file" accept="application/json" hidden />
        </label>
      </div>
    </aside>

    <!-- Editor -->
    <main class="editor">
      <div id="editorEmpty" class="editor-empty">
        <span class="empty-glyph">&lt;/&gt;</span>
        <h2>Nothing selected</h2>
        <p>Pick a note from the list, or start a new one.</p>
        <button class="btn btn-accent" onclick="openTemplateModal()">+ New note</button>
      </div>

      <div id="editorWrap" class="editor-wrap">
        <div class="editor-toolbar">
          <input id="noteTitle" class="note-title-input" placeholder="Untitled" />
          <div class="toolbar-actions">
            <button id="previewToggle" class="btn btn-ghost small" style="display:none">Preview</button>
            <button id="duplicateNoteBtn" class="icon-btn" title="Duplicate note">⎘</button>
            <button id="deleteNoteBtn" class="icon-btn danger" title="Delete note">🗑</button>
          </div>
        </div>

        <div id="colorRow" class="color-row"></div>
        <div id="langStrip" class="lang-strip"></div>

        <div class="editor-body">
          <div class="code-scroll">
            <pre class="code-pre"><code id="codeHighlight" class="hljs"></code></pre>
            <textarea id="codeArea" class="code-input" spellcheck="false" placeholder="Write code…"></textarea>
          </div>
          <textarea id="textArea" class="text-input" placeholder="Start writing… (Markdown supported)"></textarea>
          <div id="previewPane" class="preview-pane"></div>
        </div>

        <div class="status-bar">
          <span id="statusType">Plain text</span>
          <span class="status-dot">·</span>
          <span id="statusWords">0 words</span>
          <span class="status-spacer"></span>
          <span id="statusMsg">Saved</span>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Template picker modal -->
<div id="templateModal" class="modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Start a new note</h3>
      <button id="closeTemplateModal" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="templateGrid" class="template-grid"></div>
  </div>
</div>

<!-- Theme picker modal -->
<div id="themeModal" class="modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Choose a theme</h3>
      <button id="closeThemeModal" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="themeGrid" class="theme-grid"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<script src="js/languages.js"></script>
<script src="js/themes.js"></script>
<script src="js/templates.js"></script>
<script src="js/app.js"></script>
</body>
</html>
